<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Page</title>
    <style>
        
           #nav-bar {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                background: white;
                display: flex;
            } 

        @media (max-width: 768px) {
            #header-img {
                width: 100%;
                position: static;
            }

           
        }
        
    </style>   
</head>
<body>
    <header id="header">
        <img width="300" src="https://i.ibb.co.com/LdYgTV7c/429281.jpg" alt="cat" id="header-img">
        <nav id="nav-bar">
            <a href="#first_section" class="nav-link">One</a>
            <a href="#second_section" class="nav-link">Two</a>
            <a href="#third_section" class="nav-link">Three</a>
        </nav>
    </header>
    <main id="main">
        <section id="first_section">
            <iframe 
                id="video"
                width="400" 
                height="315" 
                src="https://www.youtube.com/embed/dQw4w9WgXcQ" 
                title="YouTube video player"
                frameborder="0" 
                allowfullscreen>
            </iframe>

        </section>
        <section id="second_section">
            <form action="https://www.freecodecamp.org/email-submit" id="form">
                <fieldset>
                    <label for="email">email</label>
                    <input type="email" placeholder="Write your email" name="email" id="email">
                </fieldset>
                <fieldset>
                    <input type="submit" for="form" id="submit" value="Submit">
                </fieldset>
            </form>

        </section>
        <section id="third_section">

        </section>
    </main>
    
</body>
</html>
